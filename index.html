<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibos PRO - Soporte Global</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #1a3a5a; --accent: #d32f2f; --success: #25d366; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-top: 6px solid var(--primary); }
        .header { text-align: center; margin-bottom: 15px; }
        .folio-box { background: #fff5f5; color: var(--accent); padding: 8px; border-radius: 8px; font-weight: bold; border: 1px solid var(--accent); margin-bottom: 10px; font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 0.75rem; color: #444; font-weight: bold; margin-bottom: 3px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        .money-input { display: flex; gap: 5px; }
        .money-input select { width: 60px; background: #eee; }
        .saldo-box { background: #fff9db; border: 1px solid #fab005; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-pdf { background: var(--primary); grid-column: span 2; font-size: 1rem; }
        .btn-80mm { background: #495057; }
        .btn-wa { background: var(--success); }
        .fecha-hora { font-size: 0.8rem; color: #777; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="folio-box" id="folio-display">CARGANDO FOLIO...</div>
        <h2 style="margin:0; color:var(--primary);">Soporte Global</h2>
        <div class="fecha-hora" id="live-clock"></div>
    </div>

    <div class="grid">
        <div class="full">
            <label>Nombre del Cliente</label>
            <input type="text" id="cliente" placeholder="Nombre completo">
        </div>
        <div>
            <label>Cédula / ID</label>
            <input type="text" id="cedula" placeholder="Nro de identificación">
        </div>
        <div>
            <label>Teléfono (WhatsApp)</label>
            <input type="tel" id="telefono" placeholder="Ej: 50688888888">
        </div>
        <div class="full">
            <label>Concepto del Pago</label>
            <input type="text" id="concepto" placeholder="Reparación, abono, etc.">
        </div>
        
        <div class="full">
            <label>Total Servicio</label>
            <div class="money-input">
                <select id="m1"><option>¢</option><option>$</option></select>
                <input type="number" id="total" value="0" oninput="recalcular()">
            </div>
        </div>
        <div class="full">
            <label>Monto a Pagar Hoy</label>
            <div class="money-input">
                <select id="m2"><option>¢</option><option>$</option></select>
                <input type="number" id="abono" value="0" oninput="recalcular()">
            </div>
        </div>
    </div>

    <div class="saldo-box">
        <label>Saldo Pendiente</label>
        <span id="moneda-saldo">¢</span> <strong id="val-saldo" style="font-size:1.2rem;">0.00</strong>
    </div>

    <div class="btn-group">
        <button class="btn-pdf" onclick="generarPDF()">DESCARGAR RECIBO PDF</button>
        <button class="btn-80mm" onclick="window.print()">TICKET 80MM</button>
        <button class="btn-wa" onclick="enviarWA()">ENVIAR POR WHATSAPP</button>
    </div>
</div>

<script>
    let consecutivo = 527;
    
    function actualizarReloj() {
        const ahora = new Date();
        const opciones = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('live-clock').innerText = ahora.toLocaleDateString('es-ES', opciones);
        
        const mes = String(ahora.getMonth() + 1).padStart(2, '0');
        const anio = ahora.getFullYear();
        document.getElementById('folio-display').innerText = `FOLIO: SG-${anio}-${mes}-${consecutivo}`;
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();

    function recalcular() {
        const t = parseFloat(document.getElementById('total').value) || 0;
        const a = parseFloat(document.getElementById('abono').value) || 0;
        const moneda = document.getElementById('m1').value;
        document.getElementById('m2').value = moneda;
        document.getElementById('moneda-saldo').innerText = moneda;
        document.getElementById('val-saldo').innerText = (t - a).toFixed(2);
    }

    function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const ahora = document.getElementById('live-clock').innerText;
        const folio = document.getElementById('folio-display').innerText;
        const m = document.getElementById('m1').value;

        doc.setFont("helvetica", "bold");
        doc.text("SOPORTE GLOBAL REDES Y PC'S", 20, 20);
        doc.setFontSize(10);
        doc.text(folio, 140, 20);
        doc.text(`Fecha/Hora: ${ahora}`, 20, 30);
        doc.line(20, 32, 190, 32);

        doc.setFont("helvetica", "normal");
        doc.text(`CLIENTE: ${document.getElementById('cliente').value}`, 20, 45);
        doc.text(`ID/CÉDULA: ${document.getElementById('cedula').value}`, 20, 52);
        doc.text(`CONCEPTO: ${document.getElementById('concepto').value}`, 20, 62);

        doc.setFont("helvetica", "bold");
        doc.text(`TOTAL SERVICIO:   ${m} ${document.getElementById('total').value}`, 20, 80);
        doc.text(`MONTO ABONADO:    ${m} ${document.getElementById('abono').value}`, 20, 88);
        doc.setTextColor(211, 47, 47);
        doc.text(`SALDO PENDIENTE:  ${m} ${document.getElementById('val-saldo').innerText}`, 20, 98);

        doc.save(`Recibo_${folio}.pdf`);
        consecutivo++;
    }

    function enviarWA() {
        const tel = document.getElementById('telefono').value;
        const folio = document.getElementById('folio-display').innerText;
        const cli = document.getElementById('cliente').value;
        const m = document.getElementById('m1').value;
        const abo = document.getElementById('abono').value;
        const sal = document.getElementById('val-saldo').innerText;

        if(!tel) { alert("Ingrese un teléfono"); return; }

        const msg = `*SOPORTE GLOBAL REDES Y PC'S*\n✅ Recibo: ${folio}\n👤 Cliente: ${cli}\n💰 Pago: ${m}${abo}\n📉 Saldo: ${m}${sal}\n\n_Le hemos enviado su PDF adjunto._`;
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
